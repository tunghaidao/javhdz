<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NetFlix Multi-Proxy</title>
  <link rel="stylesheet" href="/css/style.css?v=8">
  <link href="https://fonts.googleapis.com" rel="preconnect">
  <link href="https://fonts.gstatic.com" rel="preconnect" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-layout">
    <header class="navbar">
      <div class="nav-inner">
        <div class="logo"><a href="#" onclick="switchSite('javhdz');return false">NetFlix</a><span class="logo-badge">VIP</span></div>
        <nav class="nav-links" id="navLinks">
          <a href="#" data-site="javhdz" onclick="return switchSite(event,'javhdz')">JavHDz</a>
          <a href="#" data-site="vlxx" onclick="return switchSite(event,'vlxx')">VLXX</a>
          <a href="#" data-site="quatvn" onclick="return switchSite(event,'quatvn')">QuạtVN</a>
          <a href="#" data-site="viet69">Viet69</a>
          <a href="#" data-site="pornhub">Pornhub</a>
          <a href="#" data-site="kkphim">KKPhim</a>
          <a href="#" data-site="sexbjcam">SexBJCam</a>
          <a href="#" data-site="18tube">18Tube</a>
          <a href="#" data-site="javtrailers">JavTrailers</a>
          <a href="#" data-site="javtiful">JavTiful</a>
        </nav>
        <div class="nav-right">
          <a href="#" id="favNavLink" onclick="showFavorites();return false" style="color:#e50914;font-size:14px;font-weight:600;margin-right:12px;text-decoration:none">♥ <span id="favCount">0</span></a>
          <div class="search-box">
            <input type="text" id="searchInput" placeholder="Tìm kiếm...">
            <button onclick="doSearch()">🔍</button>
          </div>
          <button id="autoPlayBtn" onclick="playRandomVideo()" style="background:var(--surface2);color:#fff;border:none;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;white-space:nowrap">🎲 Random</button>
          <button onclick="playRandomFav()" style="background:var(--surface2);color:#e50914;border:none;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;white-space:nowrap">♥ Random</button>
          <button class="menu-toggle" onclick="document.querySelector('.nav-links').classList.toggle('open')">☰</button>
        </div>
      </div>
    </header>

    <div class="main-grid">
      <!-- Left Sidebar -->
      <aside class="left-sidebar" id="leftSidebar">
        <div class="sidebar-section">
          <div class="sidebar-title">📺 Danh mục</div>
          <div class="sidebar-cats" id="sidebarCats"></div>
        </div>
        <div class="sidebar-section" id="sidebarStudios" style="display:none">
          <div class="sidebar-title">🏢 Studio</div>
          <div class="sidebar-cats" id="sidebarStudiosList"></div>
        </div>
      </aside>

      <!-- Main Content -->
      <main class="main-content" id="content">
        <div class="loading-screen"><div class="spinner"></div><p>Đang tải...</p></div>
      </main>

      <!-- Right Sidebar -->
      <aside class="right-sidebar" id="rightSidebar">
        <div class="sidebar-section">
          <div class="sidebar-title">🔥 Đề xuất</div>
          <div class="sidebar-list" id="sidebarRec"></div>
        </div>
      </aside>
    </div>

    <!-- Player Overlay -->
    <div class="player-overlay" id="playerOverlay">
      <div class="player-container">
        <div class="player-header">
          <span class="player-close" onclick="closePlayer()">✕</span>
          <span id="playerTitle" style="flex:1;font-size:14px;font-weight:600;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></span>
        </div>
        <div class="player-meta">
          <div class="player-tags" id="playerTags"></div>
          <div class="player-actions" id="playerActions"></div>
        </div>
        <div class="player-wrap" id="playerWrap">
          <video id="videoPlayer" controls playsinline></video>
        </div>
        <div class="player-desc" id="playerDesc"></div>
        <div id="playerRec"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script src="/js/app.js?v=27"></script>
</body>
</html>
